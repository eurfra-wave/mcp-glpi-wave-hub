services:
  mcp-glpi-wave-hub:
    build: .
    container_name: mcp-glpi-wave-hub
    ports:
      - "${MCP_PORT:-8080}:${MCP_PORT:-8080}"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${MCP_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s