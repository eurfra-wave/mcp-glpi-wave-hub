version: "3.8"

services:
  mcp-glpi-wave-hub:
    build: .
    container_name: mcp-glpi-wave-hub
    ports:
      - "${MCP_PORT:-8080}:${MCP_PORT:-8080}"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      proxmox-internal:
        ipv4_address: ${HUB_INTERNAL_HOST}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${MCP_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  proxmox-internal:
    driver: bridge
    ipam:
      config:
        - subnet: ${PROXMOX_NETWORK_SUBNET}
    # Para conectar con LXCs existentes en Proxmox,
    # usar la red bridge existente: `docker network ls` y referenciar por nombre
    # external: true  # Descomenta si ya existe la red en Docker